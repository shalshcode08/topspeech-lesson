<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF7F1"/>
      <stop offset="1" stop-color="#F4D3C5"/>
    </linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DD7A5F"/>
      <stop offset="1" stop-color="#C25A40"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- waveform circle accent -->
  <g transform="translate(256 256)" stroke="#DD7A5F" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.18">
    <circle r="180"/>
    <circle r="140"/>
  </g>
  <!-- Italic R -->
  <text x="256" y="345" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="600" font-size="320" fill="url(#r)">R</text>
</svg>
